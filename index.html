<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی حدس عدد - درگاه کریپتو واقعی</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            margin-top: 30px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 450px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 60%;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .tx-input {
            padding: 8px;
            font-size: 14px;
            width: 80%;
            border: 1px solid #007bff;
            border-radius: 5px;
            margin-bottom: 10px;
            font-family: monospace;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .pay-btn {
            background-color: #7289da;
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            width: 85%;
            margin-top: 5px;
        }
        .pay-btn:hover {
            background-color: #5b6eae;
        }
        .wallet-connect-btn {
            background-color: #f6851b;
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 15px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
        }
        .wallet-connect-btn:hover {
            background-color: #e27516;
        }
        .wallet-box {
            background-color: #f0f4f8;
            padding: 10px;
            border: 1px dashed #007bff;
            border-radius: 5px;
            font-family: monospace;
            word-break: break-all;
            user-select: all;
            margin: 10px 0;
            font-size: 14px;
        }
        .divider {
            margin: 20px 0;
            border-top: 1px solid #ddd;
            position: relative;
        }
        .divider span {
            background: #fff;
            padding: 0 10px;
            color: #888;
            font-size: 14px;
        }
        .message {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }
        .game-area {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>بازی حدس عدد (نسخه کریپتو واقعی 🪙)</h1>
        
        <div id="paymentSection">
            <p>برای دسترسی به این بازی جذاب، معادل ۲ دلار (BNB/ETH) پرداخت کنید:</p>
            
            <button class="wallet-connect-btn" onclick="payWithWallet()">🔗 اتصال والت و پرداخت ۲ دلاری 💎</button>
            
            <div class="divider"><span>یا روش دوم</span></div>

            <div>
                <p style="font-size: 14px; font-weight: bold;">واریز دستی به آدرس زیر:</p>
                <div class="wallet-box">0x1234567890abcdef1234567890abcdef12345678</div>
                <p style="font-size: 12px; color: #666;">شبکه: بایننس (BEP20) یا اتریوم (ERC20)</p>
                
                <input type="text" class="tx-input" id="txHashInput" placeholder="Transaction Hash (TXID) را اینجا وارد کنید">
                <br>
                <button class="pay-btn" onclick="verifyManualPayment()">ثبت واریز دستی و شروع بازی 🚀</button>
            </div>
        </div>

        <div class="game-area" id="gameArea">
            <p>من یک عدد بین ۱ تا ۱۰۰ انتخاب کرده‌ام. سعی کن آن را حدس بزنی.</p>
            <input type="number" id="guessInput" placeholder="عدد خود را وارد کنید">
            <button onclick="checkGuess()">بررسی</button>
            <div class="message" id="message"></div>
        </div>
    </div>

    <script>
        let secretNumber;
        let attempts = 0;

        // پرداخت واقعی از طریق متاماسک
        async function payWithWallet() {
            if (typeof window.ethereum === 'undefined') {
                alert("❌ افزونه کیف پول (متاماسک) در مرورگر شما پیدا نشد. لطفاً متاماسک را نصب کنید.");
                return;
            }

            try {
                // درخواست اتصال به کیف پول
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                const userAccount = accounts[0];

                // مقدار 2 دلار به Wei (برای شبکه های بر پایه اتریوم/اسمارت چین). 
                // به طور مثال 0.005 عدد از ارز شبکه (حدودی برای معادل 2 دلار).
                // شما می‌توانید این عدد را بسته به نیاز دقیق شبکه خود تغییر دهید.
                const amountInWei = "0x12305bc6e48000"; 

                // آدرس کیف پول شما برای دریافت وجه (حتماً آدرس خود را اینجا بگذارید)
                const destinationAddress = "0x1234567890abcdef1234567890abcdef12345678";

                // ارسال درخواست تراکنش به متاماسک
                const txHash = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [
                        {
                            from: userAccount,
                            to: destinationAddress,
                            value: amountInWei, 
                        },
                    ],
                });

                alert("🎉 تراکنش با موفقیت امضا شد! هش تراکنش شما: " + txHash);
                unlockGame();

            } catch (error) {
                console.error(error);
                alert("پرداخت انجام نشد یا توسط شما لغو گردید.");
            }
        }

        function unlockGame() {
            document.getElementById('paymentSection').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            
            secretNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
        }

        function verifyManualPayment() {
            let txHash = document.getElementById('txHashInput').value.trim();
            
            if (txHash === "") {
                alert("لطفاً پس از واریز، Transaction Hash (TXID) را در کادر وارد کنید.");
                return;
            }

            if (txHash.length < 15) {
                alert("هش تراکنش وارد شده معتبر نیست. لطفاً هش کامل (TXID) را وارد کنید.");
                return;
            }

            alert("هش تراکنش شما به صورت دستی ثبت شد! به بازی خوش آمدید.");
            unlockGame();
        }

        function checkGuess() {
            let guessInput = document.getElementById('guessInput');
            let messageDiv = document.getElementById('message');
            let guess = parseInt(guessInput.value);

            if (isNaN(guess) || guess < 1 || guess > 100) {
                messageDiv.innerText = "لطفاً یک عدد معتبر بین ۱ تا ۱۰۰ وارد کنید.";
                return;
            }

            attempts++;

            if (guess < secretNumber) {
                messageDiv.innerText = "بیشتر است! (عدد بزرگتر حدس بزن) ⬆️";
            } else if (guess > secretNumber) {
                messageDiv.innerText = "کمتر است! (عدد کوچکتر حدس بزن) ⬇️";
            } else {
                messageDiv.innerText = `تبریک می‌گم! 🎉 عدد درست همین بود. شما موفق شدید در ${attempts} تلاش آن را حدس بزنید.`;
                document.getElementById('guessInput').disabled = true;
            }
            
            guessInput.value = '';
            guessInput.focus();
        }
    </script>

</body>
</html>
