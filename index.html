<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی حدس عدد - نسخه کریپتو واقعی</title>
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f4f7f6;
            text-align: center;
            margin-top: 50px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 450px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 60%;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .tx-input {
            padding: 10px;
            font-size: 14px;
            width: 80%;
            border: 1px solid #007bff;
            border-radius: 5px;
            margin-bottom: 15px;
            font-family: monospace;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .pay-btn {
            background-color: #7289da;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 15px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .pay-btn:hover {
            background-color: #5b6eae;
        }
        .wallet-box {
            background-color: #f0f4f8;
            padding: 10px;
            border: 1px dashed #007bff;
            border-radius: 5px;
            font-family: monospace;
            word-break: break-all;
            user-select: all;
            margin: 15px 0;
            font-size: 14px;
        }
        .message {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }
        .game-area {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>بازی حدس عدد (نسخه کریپتو 🪙)</h1>
        
        <div id="paymentSection">
            <p>برای دسترسی به این بازی جذاب، باید معادل ۲ دلار (USDT/ETH) به آدرس کیف پول زیر واریز کنید:</p>
            
            <div class="wallet-box">0x1234567890abcdef1234567890abcdef12345678</div>
            
            <p style="font-size: 13px; color: #666;">شبکه انتقال: ترون (TRC20) یا بایننس (BEP20)</p>
            
            <input type="text" class="tx-input" id="txHashInput" placeholder="لطفاً Transaction Hash (TXID) را اینجا وارد کنید">
            <br>
            <button class="pay-btn" onclick="verifyCryptoPayment()">واریز کردم، شروع بازی 🚀</button>
        </div>

        <div class="game-area" id="gameArea">
            <p>من یک عدد بین ۱ تا ۱۰۰ انتخاب کرده‌ام. سعی کن آن را حدس بزنی.</p>
            <input type="number" id="guessInput" placeholder="عدد خود را وارد کنید">
            <button onclick="checkGuess()">بررسی</button>
            <div class="message" id="message"></div>
        </div>
    </div>

    <script>
        let secretNumber;
        let attempts = 0;

        function verifyCryptoPayment() {
            let txHash = document.getElementById('txHashInput').value.trim();
            
            // بررسی اینکه کاربر کادر هش را خالی نگذاشته باشد
            if (txHash === "") {
                alert("لطفاً پس از انجام واریز، Transaction Hash (TXID) پرداخت خود را در کادر وارد کنید.");
                return;
            }

            // بررسی ساده برای طول هش (معمولاً هش های اتریوم و ترون طولانی هستند)
            if (txHash.length < 15) {
                alert("هش تراکنش وارد شده معتبر به نظر نمی‌رسد. لطفاً هش کامل (TXID) را به درستی وارد کنید.");
                return;
            }

            alert("هش تراکنش شما دریافت و ثبت شد! (شبیه‌سازی). به بازی خوش آمدید.");
            
            document.getElementById('paymentSection').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            
            secretNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
        }

        function checkGuess() {
            let guessInput = document.getElementById('guessInput');
            let messageDiv = document.getElementById('message');
            let guess = parseInt(guessInput.value);

            if (isNaN(guess) || guess < 1 || guess > 100) {
                messageDiv.innerText = "لطفاً یک عدد معتبر بین ۱ تا ۱۰۰ وارد کنید.";
                return;
            }

            attempts++;

            if (guess < secretNumber) {
                messageDiv.innerText = "بیشتر است! (عدد بزرگتر حدس بزن) ⬆️";
            } else if (guess > secretNumber) {
                messageDiv.innerText = "کمتر است! (عدد کوچکتر حدس بزن) ⬇️";
            } else {
                messageDiv.innerText = `تبریک می‌گم! 🎉 عدد درست همین بود. شما موفق شدید در ${attempts} تلاش آن را حدس بزنید.`;
                document.getElementById('guessInput').disabled = true;
            }
            
            guessInput.value = '';
            guessInput.focus();
        }
    </script>

</body>
</html>
